<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f3ee" />
    <meta
      name="description"
      content="Refer listens for movie, TV, book, meme, and TikTok references and pulls up the source."
    />
    <title>Refer - Get the reference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=3" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="Refer home">
        <span class="brand-mark" aria-hidden="true"><i data-lucide="audio-lines"></i></span>
        <span>Refer<span class="brand-dot">.</span></span>
      </a>
      <a
        class="icon-button"
        href="https://github.com/KabirKoratkar/refer"
        aria-label="Open project on GitHub"
        title="Open GitHub repository"
      >
        <i data-lucide="github"></i>
      </a>
    </header>

    <main class="app-shell">
      <section class="capture" aria-labelledby="page-title">
        <div class="capture-heading">
          <div>
            <p class="eyebrow">Live reference finder</p>
            <h1 id="page-title">What did they mean?</h1>
          </div>
          <div id="live-badge" class="live-badge"><span></span><span id="live-label">Ready</span></div>
        </div>

        <div class="capture-bar" role="search">
          <i data-lucide="search" aria-hidden="true"></i>
          <label class="sr-only" for="reference-search">Search a quote or reference</label>
          <input
            id="reference-search"
            type="search"
            placeholder="Say or type a quote, meme, or TikTok sound"
            autocomplete="off"
          />
          <button id="listen-button" class="mic-button" type="button" title="Start listening">
            <i data-lucide="mic"></i><span>Listen</span>
          </button>
          <button id="search-button" class="find-button" type="button" aria-label="Find reference" title="Find reference">
            <i data-lucide="arrow-right"></i>
          </button>
        </div>

        <div class="transcript-row" aria-live="polite">
          <div id="waveform" class="mini-wave" aria-hidden="true"><span></span><span></span><span></span></div>
          <p id="transcript">Listening is off. Type above or turn it on.</p>
          <button id="clear-button" class="clear-button" type="button" aria-label="Clear transcript" title="Clear transcript">
            <i data-lucide="x"></i>
          </button>
        </div>

        <button id="sample-button" class="demo-button" type="button">Try a demo reference</button>
        <p id="support-note" class="support-note" hidden></p>
      </section>

      <section id="result-panel" class="result-panel" aria-live="polite">
        <div id="empty-state" class="empty-state">
          <i data-lucide="captions"></i>
          <p>Movie, show, book, meme, and TikTok references will appear here.</p>
        </div>
        <div id="result-content" class="result-content" hidden></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="app.js?v=3"></script>
  </body>
</html>
